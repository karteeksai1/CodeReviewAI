services:
  - type: web
    name: codereviewai-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEON_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AGENT_URL
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false

  - type: worker
    name: codereviewai-worker
    runtime: node
    rootDir: apps/api
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: QUEUE_CONCURRENCY
        value: 3
      - key: NEON_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AGENT_URL
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false

  - type: web
    name: codereviewai-agent
    runtime: python
    rootDir: apps/agent
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-70b-versatile
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HUGGINGFACE_EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: EMBEDDING_DIMENSIONS
        value: 384
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        sync: false
